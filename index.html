    // M5 企業類型
    m5_nav: "企業類型",
    m5_title: "創業的五種類型",
    m5_p1: "Ethan Mollick 教授指出，並非所有創業都相同。依據目標、資源需求、成長野心和退出策略，可分為五大類型。理解自己屬於哪種類型，是制定正確策略的第一步。",
    m5_p2: "「了解你是哪種創業者，才能知道需要什麼資源、面對什麼挑戰、以及追求什麼樣的成功。」",
    m5_cards: [
      { title: "🏠 生活方式型（Lifestyle）", desc: "以興趣或副業形式經營，目標是享受過程。資金需求少，不計劃擴張，也無退出計劃。（例：Etsy 手工藝販售者）" },
      { title: "🏪 小型企業（Small Business）", desc: "全球最普遍的企業形式，目標是養家活口、當自己的老闆。透過貸款或親友資金，超過 2/3 不計劃成長。" },
      { title: "🚀 高成長新創（High Growth Startup）", desc: "矽谷模式：目標是成為下一個 Google 或 Uber，或被收購。依靠創投與天使資金，以 IPO 或收購為退出策略。" },
      { title: "🏢 企業內部創業（Intrapreneurship）", desc: "大企業內部的新創行動，利用公司資源，退出方式是被母公司採納整合。" },
      { title: "🌍 社會創業（Social Venture）", desc: "主要目標是實現社會使命，依靠政府補助、基金會和社會影響力基金，通常不計劃退出。" }
    ],
    m5_terms: [
      { front: "高成長新創 High Growth Startup", back: "以快速擴張、IPO 或高額收購為目標，依賴創投資金，是「矽谷模式」的代表。" },
      { front: "社會創業 Social Venture", back: "以社會使命為首要目標，兼顧財務可持續，追求「三重底線」：利潤、社會影響、環境影響。" },
      { front: "企業內部創業 Intrapreneurship", back: "在現有大企業框架內進行創業式創新，使用公司資源，但保持創業精神和靈活度。" }
    ],
    m5_q: [
      { q: "以下哪種企業類型最注重快速成長和財務退出？", opts: ["生活方式型","小型企業","高成長新創","社會創業"], ans: 2, exp: "高成長新創以 IPO 或被高額收購為目標，需要創投資金，追求極速擴張。" },
      { q: "小型企業的主要特徵是？", opts: ["追求 IPO","超過 2/3 不想成長，以養家為主","必須有創投支持","專注社會使命"], ans: 1, exp: "小型企業是全球最常見的企業形式，超過 2/3 的小型企業主並不希望大幅擴張。" },
      { q: "社會創業（Social Venture）的主要資金來源是？", opts: ["創投基金","IPO 融資","政府補助、基金會、社會影響力基金","銀行貸款"], ans: 2, exp: "社會創業通常不適合傳統創投，需要耐心資本，主要來源包括基金會（如蓋茨基金會）和政府補助。" },
      { q: "Etsy 上銷售手工藝品的賣家最可能屬於哪種創業類型？", opts: ["高成長新創","生活方式型","企業內部創業","社會創業"], ans: 1, exp: "Etsy 賣家通常以興趣為出發點，收入為輔，不計劃擴張，符合生活方式型創業。" },
      { q: "企業內部創業的「退出」方式通常是？", opts: ["IPO","被外部公司收購","被母公司採納整合","關閉事業"], ans: 2, exp: "Intrapreneurship 的成功結果通常是項目被母公司正式採納，成為公司的新業務線。" },
      { q: "「三重底線」（Triple Bottom Line）指的是？", opts: ["收益、成本、利潤","利潤、社會影響、環境影響","市場、產品、通路","人才、技術、資金"], ans: 1, exp: "社會創業追求三重底線：財務利潤（Profit）、社會影響（Social Impact）、環境影響（Environmental Impact）。" },
      { q: "高成長新創主要依靠哪種資金？", opts: ["銀行貸款","政府補助","創投（VC）與天使投資","親友借款"], ans: 2, exp: "高成長新創需要大量快速資金支持擴張，主要依賴創投基金和天使投資人。" },
      { q: "哪種企業類型對「不計劃退出」的描述最為準確？", opts: ["高成長新創","生活方式型企業和社會創業","企業內部創業","小型企業"], ans: 1, exp: "生活方式型和社會創業通常都沒有計劃退出，前者以享受為目的，後者以使命為導向。" }
    ],
    // M6 科技創業
    m6_nav: "科技創業",
    m6_title: "科技創業：機會視窗與競爭優勢",
    m6_p1: "David H. Hsu 教授指出，技術變革為創業者創造了獨特機會視窗。Genentech 與重組 DNA 技術、Google 與 Facebook 與網際網路的興起，都是創業者在技術轉折點抓住機會的典型案例。然而，技術進步本身並不保證創業成功——商業模式、資源整合和進入策略同樣關鍵。",
    m6_p2: "「技術是創業的催化劑，但不是充分條件——創業者需要在技術、商業模式和資源整合之間找到完美平衡。」",
    m6_p3: "科技創業的利潤分配取決於兩個核心要素：可占用性（Appropriability，控制知識的能力）和互補性資產（Complementary Assets，商業化所需的其他資源）。在技術生命週期的不同階段，這兩個因素的相對重要性會有所不同。",
    m6_cards: [
      { title: "可占用性 Appropriability", desc: "若創新知識能被完全「占用」，則他人無法複製，知識的獨特性是強大的議價籌碼。來源：智慧財產保護、商業機密、市場速度（速度第一）。" },
      { title: "互補性資產 Complementary Assets", desc: "商業化創新所需的額外資源：製造能力、配銷通路、品牌聲譽、客戶關係等。在成熟階段，這些資產往往比核心技術更重要。" }
    ],
    m6_timeline: [
      { title: "萌芽期（Ferment）", desc: "技術方案百花齊放，獨特性（Uniqueness）高，但互補性資產稀少。創業者的核心優勢來自技術知識的獨特性。", highlight: false },
      { title: "起飛期（Takeoff）", desc: "主流設計（Dominant Design）開始確立，獨特性降低，互補性資產重要性上升。", highlight: true },
      { title: "成熟期（Maturity）", desc: "技術已標準化，獨特性低，互補性資產（品牌、通路、規模）成為主要競爭優勢。", highlight: false }
    ],
    m6_terms: [
      { front: "主流設計 Dominant Design", back: "技術競爭結束後確立的標準規格，一旦出現，市場競爭轉向互補性資產和執行效率。" },
      { front: "可占用性 Appropriability", back: "創業者控制和保護創新知識不被複製的能力，來源包括專利、商業機密和先行者優勢。" },
      { front: "科技創業叢聚 Tech Cluster", back: "矽谷、波士頓等地因勞動力市場、資本市場和知識流動的集中效應，形成科技創業的地理聚落。" }
    ],
    m6_q: [
      { q: "科技創業者在技術生命週期哪個階段擁有最高的「獨特性」優勢？", opts: ["成熟期","起飛期","萌芽期","衰退期"], ans: 2, exp: "萌芽期（Ferment）技術尚未標準化，創新者的技術知識最具獨特性，議價能力最強。" },
      { q: "「可占用性」的主要來源不包括？", opts: ["智慧財產保護","商業機密","市場速度（先行者優勢）","廣告行銷"], ans: 3, exp: "可占用性來源包括 IP 保護、商業機密和速度優勢，廣告行銷屬於互補性資產，非可占用性。" },
      { q: "1980-2013 年間，美國 IPO 中風投支持企業佔多少比例？", opts: ["約 15%","約 36%","約 58%（科技 IPO）","約 80%"], ans: 1, exp: "風投支持企業佔美國 IPO 總數的 36%，但在科技 IPO 中比例高達 58%。" },
      { q: "矽谷科技創業叢聚形成的原因是？", opts: ["氣候宜人","勞動力市場、資本市場集中和知識流動效應","政府補貼","成本低廉"], ans: 1, exp: "矽谷的集聚效應源於勞動力市場靈活性、創投資本集中和同行之間的知識溢出效應。" },
      { q: "「互補性資產」在哪個技術階段最為重要？", opts: ["萌芽期","起飛期","成熟期","研發期"], ans: 2, exp: "成熟期技術已標準化，核心技術的獨特性降低，配銷、品牌、客戶關係等互補性資產成為主要競爭優勢。" },
      { q: "創業者同時擁有技術和商業知識的創始團隊有何優勢？", opts: ["降低研發成本","幫助更好地平衡技術創新與商業化","增加融資機會","避免政府監管"], ans: 1, exp: "兼具技術和商業知識的團隊能更有效地將技術轉化為商業價值，是科技創業成功的重要因素。" },
      { q: "PayPal 的「Paypal Mafia」現象說明了什麼？", opts: ["PayPal 是最成功的科技公司","成功企業的員工是下一代創業者的重要來源","矽谷的薪資水平最高","只有名校畢業生才能成功創業"], ans: 1, exp: "Thiel、Musk、Hoffman 等 PayPal 校友創立了多家重要公司，體現了成功企業作為創業生態「搖籃」的角色。" },
      { q: "技術 S 曲線中「起飛期」（Takeoff）的特徵是？", opts: ["技術剛被發明，尚未商業化","主流設計開始確立，市場快速擴張","技術成熟，增長趨緩","技術被更新一代技術取代"], ans: 1, exp: "起飛期是技術應用開始大規模擴散、市場快速增長的階段，主流設計正在形成或剛確立。" }
    ],
    // M7 影響力創業
    m7_nav: "影響力創業",
    m7_title: "影響力創業：改變世界的商業模式",
    m7_p1: "Kartik Hosanagar 教授定義影響力創業為：創立以道德為基礎、對社會有實質影響的企業。這類企業不同於純粹的非營利組織，它們追求「三重底線」：財務利潤、社會影響和環境影響。常見領域包括醫療、衛生、教育和能源。",
    m7_p2: "「影響力創業者相信：商業的力量可以成為解決社會問題最有效的工具——前提是讓社會使命成為業務模式的核心，而非附加選項。」",
    m7_p3: "影響力企業面臨兩大核心挑戰：規模化（Scaling）和融資（Financing）。傳統創投通常不適合，需要「耐心資本」。成功的社會創業者往往採用三個原則：產品優先、使命要真實、執行要簡單（如 Warby Parker 的「買一捐一」模式）。",
    m7_examples: [
      { name: "Muhammad Yunus – GrameenBank", desc: "為孟加拉農村貧困人口提供小額貸款，服務超過 800 萬借款人，還款率超過 95%。" },
      { name: "Iqbal Quadir – GrameenPhone", desc: "相信連網能增加收入和就業機會，在孟加拉建立擁有超過 5,000 萬用戶的最大電信運營商。" },
      { name: "Warby Parker / TOMS Shoes", desc: "透過「買一捐一」模式，將社會使命融入商業模式，以品牌個性影響消費行為，同時完成社會目標。" }
    ],
    m7_terms: [
      { front: "三重底線 Triple Bottom Line", back: "影響力創業的評估框架：財務利潤（Profit）+ 社會影響（People）+ 環境影響（Planet）。" },
      { front: "耐心資本 Patient Capital", back: "願意接受較長回收期和較低財務回報的投資，以換取社會影響力最大化，如 Acumen Fund 等。" },
      { front: "規模化 Scaling", back: "影響力企業擴大觸及範圍的策略，包括加盟夥伴、政策倡導，以及與有最後一哩服務能力的機構合作。" }
    ],
    m7_q: [
      { q: "影響力創業（Impact Entrepreneurship）的核心特徵是？", opts: ["只專注社會公益，不追求利潤","追求三重底線：利潤、社會和環境影響","與政府合作的非營利組織","不需要融資的自給自足企業"], ans: 1, exp: "影響力創業既追求財務可持續，又以社會和環境影響為核心使命，是區別於傳統創業和純公益的第三條路。" },
      { q: "GrameenBank 的創新在哪裡？", opts: ["提供高利貸","向農村貧困人口提供無抵押小額貸款","只服務企業客戶","專注城市中產階級"], ans: 1, exp: "GrameenBank 打破傳統銀行需要抵押品的規則，向農村貧困人口提供小額貸款，還款率超 95%。" },
      { q: "影響力企業最常面臨的兩大挑戰是？", opts: ["人才招募和技術研發","規模化和融資","政府法規和稅務","行銷和品牌建立"], ans: 1, exp: "服務偏遠或弱勢群體的社會成本高，規模化困難；傳統創投不適合，需要特殊的融資管道。" },
      { q: "Warby Parker 的 CEO 認為，社會使命對消費者決策的影響排在第幾位？", opts: ["第一位","第二位","第三位","第四位"], ans: 3, exp: "消費者主要考慮設計、成本、品質，社會使命通常排第四，但它創造了品牌個性，間接影響購買決策。" },
      { q: "「耐心資本」（Patient Capital）的特徵是？", opts: ["追求快速高報酬","接受較長回收期換取社會影響最大化","只投資成熟市場","由政府提供的無償補助"], ans: 1, exp: "耐心資本（如 Acumen Fund）接受較低且較慢的財務回報，優先追求可持續的社會影響。" },
      { q: "GrameenPhone 的創辦人 Iqbal Quadir 的核心信念是？", opts: ["電話是奢侈品","連網能提升貧困人口的收入和就業機會","只有城市才需要電信服務","技術無法解決貧困問題"], ans: 1, exp: "Quadir 相信連網可以提升生產力和就業，他在孟加拉打造最大電信商，成為影響力創業的典範。" },
      { q: "成功整合社會使命與商業模式的三個原則是？", opts: ["低成本、高效率、快速擴張","產品優先、使命要真實、執行要簡單","公益優先、利潤其次、規模第三","技術領先、市場滲透、IPO退出"], ans: 1, exp: "Hosanagar 教授總結：以產品品質為先、社會使命需發自本心、執行方式要簡單易懂（如買一捐一）。" },
      { q: "Teamlease 的 Manish Sabharwal 在印度面臨的主要成長障礙是？", opts: ["缺乏技術人才","勞動法規不明確","融資困難","市場規模太小"], ans: 1, exp: "Teamlease 幫助印度人找工作，但印度勞動法規的不清晰成為其規模化的主要障礙。" }

    m1_title: "What is Entrepreneurship?",

    m1_terms: [

      { front: "Financial Sustainability", back: "Long-term positive cash flow: Q(p-c) > F for product firms, or LTV > CAC for service firms." },

      { q: "LTV > CAC applies to which type of business?", opts: ["Manufacturing","Physical retail","Service and subscription businesses","Agriculture"], ans: 2, exp: "LTV (Customer Lifetime Value) > CAC (Customer Acquisition Cost) is the sustainability formula for subscription/service models." },

    m3_p1: "Prof. Lori Rosenkopf notes that established firms can also be entrepreneurial. This is called 'intrapreneurship' or 'ambidextrous innovation'—simultaneously exploiting existing advantages while exploring new opportunities.",
    m3_p2: '"The most successful companies balance stable day-to-day operations with continuous exploration of potentially disruptive opportunities."',
    m3_p3: "Clay Christensen's disruptive innovation theory: new technologies typically enter from the low end or periphery, gradually exceeding mainstream performance. Established firms can maintain innovation through three strategies: internal development, partnerships, and acquisitions.",
    m3_timeline: [
      { title: "Internal Development", desc: "Protect exploration through separate organizational units or dedicated individual time (e.g., Google X, 3M's 15% time, LinkedIn's [in]cubator).", highlight: false },
      { title: "Strategic Partnerships", desc: "Collaborate with startups or complementary firms (e.g., Tesla-Toyota, Tesla-Airbnb partnerships) to access new capabilities.", highlight: true },

      { q: "The three strategies for innovation in established firms are:", opts: ["R&D, Marketing, HR","Internal Development, Partnerships, Acquisitions","Financing, IPO, Expansion","Research, Development, Sales"], ans: 1, exp: "Three strategies: Internal Development, Strategic Partnerships, and Acquisitions." },
      { q: "3M's '15% time' policy is an example of which innovation strategy?", opts: ["Acquiring startups","Strategic alliances","Internal development with dedicated individual time","Government partnership"], ans: 2, exp: "3M's policy of giving employees time for personal projects is a form of protected exploration within internal development strategy." },

    ],

    // M6
    m6_nav: "Tech Entrepreneurship",
    m6_title: "Technology Entrepreneurship: Windows & Competitive Advantage",
    m6_p1: "Prof. David H. Hsu notes that technological change creates unique opportunity windows for entrepreneurs. Genentech with recombinant DNA, Google and Facebook with the internet—these are all cases of entrepreneurs seizing opportunities at technological inflection points. However, technological progress alone does not guarantee success; business model, resource assembly, and entry strategy are equally critical.",
    m6_p2: '"Technology is the catalyst of entrepreneurship, but not the sufficient condition—entrepreneurs must find the perfect balance between technology, business model, and resource assembly."',
    m6_p3: "Profit distribution in tech entrepreneurship depends on two core factors: Appropriability (ability to control knowledge) and Complementary Assets (other resources needed to commercialize). The relative importance of these factors shifts across the technology lifecycle.",
    m6_cards: [
      { title: "Appropriability", desc: "If innovation knowledge can be completely 'appropriated,' others cannot replicate it—uniqueness is tremendous bargaining power. Sources: IP protection, trade secrecy, and speed (first-mover advantage)." },
      { title: "Complementary Assets", desc: "Additional resources needed to commercialize innovation: manufacturing capability, distribution channels, brand reputation, customer relationships. At maturity, often more important than the core technology." }
    ],
    m6_timeline: [
      { title: "Ferment", desc: "Multiple technology solutions compete; uniqueness is high but complementary assets are scarce. Core advantage comes from knowledge uniqueness.", highlight: false },
      { title: "Takeoff", desc: "Dominant design begins to emerge; uniqueness declines as complementary assets grow in importance.", highlight: true },
      { title: "Maturity", desc: "Technology standardized; low uniqueness. Complementary assets (brand, channels, scale) become the primary competitive advantage.", highlight: false }
    ],
    m6_terms: [
      { front: "Dominant Design", back: "The standard specification that emerges after technological competition ends. Once established, competition shifts to complementary assets and execution efficiency." },
      { front: "Appropriability", back: "An entrepreneur's ability to control and protect innovation knowledge from being copied. Sources: patents, trade secrets, first-mover advantage." },
      { front: "Tech Cluster", back: "Geographic concentrations of tech entrepreneurship (Silicon Valley, Boston) formed by labor market, capital market, and knowledge spillover concentration effects." }

      { q: "Which is NOT a source of appropriability?", opts: ["IP protection","Trade secrets","Speed/first-mover advantage","Advertising and marketing"], ans: 3, exp: "Appropriability sources include IP protection, trade secrets, and speed advantage. Marketing is a complementary asset, not appropriability." },
      { q: "From 1980-2013, VC-backed firms represented what percentage of US IPOs?", opts: ["~15%","~36%","~58% (tech IPOs)","~80%"], ans: 1, exp: "VC-backed firms represented 36% of all US IPOs, but 58% of technology-specific IPOs." },
      { q: "Why do tech entrepreneurship clusters form in Silicon Valley?", opts: ["Pleasant climate","Concentrated labor markets, capital markets, and knowledge spillovers","Government subsidies","Low costs"], ans: 1, exp: "Silicon Valley's cluster effects stem from labor market flexibility, concentrated venture capital, and knowledge spillovers among peers." },
      { q: "At which technology stage are complementary assets MOST important?", opts: ["Ferment","Takeoff","Maturity","R&D stage"], ans: 2, exp: "At maturity, technology is standardized, core uniqueness diminishes, and distribution channels, brand, and customer relationships become the key differentiators." },
      { q: "What advantage do founding teams with both technical AND commercial knowledge have?", opts: ["Lower R&D costs","Better balance between innovation and commercialization","More funding opportunities","Avoiding government regulation"], ans: 1, exp: "Teams combining technical and commercial knowledge can more effectively translate technology into commercial value—a key success factor in tech entrepreneurship." },
      { q: "What does the 'PayPal Mafia' phenomenon illustrate?", opts: ["PayPal is the most successful tech company","Successful companies are important sources of the next generation of entrepreneurs","Silicon Valley pays the highest salaries","Only elite graduates can succeed"], ans: 1, exp: "Thiel, Musk, Hoffman and other PayPal alumni founded multiple important companies, demonstrating successful companies as 'cradles' of the entrepreneurial ecosystem." },

    m7_title: "Impact Entrepreneurship: Business Models That Change the World",
    m7_p1: "Prof. Kartik Hosanagar defines impact entrepreneurship as creating enterprises that are ethical and have meaningful impact on our lives. Unlike pure nonprofits, they pursue profit. Unlike traditional entrepreneurs, they focus on a 'triple bottom line': profit, social impact, and environmental impact. Common areas include healthcare, sanitation, education, and energy.",

    m7_p3: "Impact enterprises face two core challenges: Scaling and Financing. Traditional VCs are often not an option—'patient capital' is needed. Successful social entrepreneurs adopt three principles: lead with product, ensure mission is authentic, implement simply (like Warby Parker's 'buy one, give one' model).",

const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit }) => {
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState(false);
  // 只存索引，不存題目文字，確保語言切換後渲染內容即時更新
  const [quizIndices] = useState(() =>
    [...Array(questions.length).keys()].sort(() => Math.random() - 0.5).slice(0, 4)
  );
  const handleSubmit = () => {
    if (Object.keys(selected).length < quizIndices.length) return;
    const correctCount = quizIndices.filter((qIdx, i) => selected[i] === questions[qIdx].ans).length;
    setSubmitted(true);
    onQuizSubmit(moduleId, correctCount, quizIndices.length);
  };
  const handleRetry = () => { setSelected({}); setSubmitted(false); };
  const correctCount = submitted ? quizIndices.filter((qIdx, i) => selected[i] === questions[qIdx].ans).length : 0;
  return (
    <div className="mt-8 bg-slate-50 dark:bg-slate-900 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="font-serif font-bold text-xl text-[#004030] dark:text-[#D8C3A5] mb-6 flex items-center">
        <IconBookOpen size={20} className="mr-2"/>{t.quiz_title}
      </h3>
      {quizIndices.map((qIdx, qi) => {
        const q = questions[qIdx]; // 永遠從當前語言的 questions 取值
        return (
          <div key={qIdx} className="mb-6">
            <p className="font-semibold text-slate-800 dark:text-slate-200 mb-3">{qi+1}. {q.q}</p>
            <div className="space-y-2">
              {q.opts.map((opt, oi) => {
                let cls = "w-full text-left px-4 py-2.5 rounded-lg border text-sm transition-colors ";
                if (!submitted) {
                  cls += selected[qi] === oi ? "border-[#004030] bg-[#004030]/10 dark:bg-[#D8C3A5]/10 text-[#004030] dark:text-[#D8C3A5] font-semibold" : "border-slate-200 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300";
                } else {
                  if (oi === q.ans) cls += "border-green-500 bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 font-semibold";
                  else if (selected[qi] === oi) cls += "border-red-400 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400";
                  else cls += "border-slate-200 dark:border-slate-600 text-slate-500 dark:text-slate-500";
                }
                return <button key={oi} className={cls} onClick={() => !submitted && setSelected({...selected, [qi]: oi})}>{opt}</button>;
              })}
            </div>
            {submitted && <p className="mt-2 text-xs text-slate-500 dark:text-slate-400 italic">{t.explanation}：{q.exp}</p>}
          </div>
        );
      })}
      {!submitted ? (
        <button onClick={handleSubmit} disabled={Object.keys(selected).length < quizIndices.length}
          className="px-6 py-2.5 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-bold rounded-lg disabled:opacity-40 hover:bg-[#002b20] dark:hover:bg-white transition-colors">
          {t.submit}
        </button>
      ) : (
        <div className="flex items-center space-x-4">
          <span className="font-bold text-lg text-[#004030] dark:text-[#D8C3A5]">{t.score}：{correctCount} / {quizIndices.length}</span>
          <button onClick={handleRetry} className="px-4 py-2 border border-[#004030] dark:border-[#D8C3A5] text-[#004030] dark:text-[#D8C3A5] rounded-lg hover:bg-[#004030]/10 text-sm font-semibold transition-colors">{t.retry}</button>
        </div>
      )}
    </div>
  );
};

function App() {
  const [lang, setLang] = useState('zh');
  const [isDark, setIsDark] = useState(false);
  const [module, setModule] = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);
  const menuRef = React.useRef(null);
  React.useEffect(() => {
    if (!menuOpen) return;
    const handler = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [menuOpen]);
  const [ttsState, setTtsState] = useState('idle');
  const [studentInfo, setStudentInfo] = useState({ group:'', dept:'', id:'', name:'' });
  const N = 7;
  const [analytics, setAnalytics] = useState({
    time: Array(N).fill(0),
    clicks: Array(N).fill(0),
    quizCorrect: Array(N).fill(0),
    quizTotal: Array(N).fill(0)
  });
  const contentRef = useRef(null);
  const timerRef = useRef(null);
  const t = dict[lang];

  useEffect(() => {
    if (isDark) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  }, [isDark]);

  useEffect(() => {
    window.speechSynthesis && window.speechSynthesis.cancel();
    setTtsState('idle');
    window.scrollTo({top: 0, behavior: 'smooth'});
    if (timerRef.current) clearInterval(timerRef.current);
    if (module < N) {
      timerRef.current = setInterval(() => {
        setAnalytics(a => { const t2 = [...a.time]; t2[module]++; return {...a, time: t2}; });
      }, 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [module]);

  const handleClick = () => {
    if (module < N) setAnalytics(a => { const c = [...a.clicks]; c[module]++; return {...a, clicks: c}; });
  };

  const handleQuizSubmit = (modId, correct, total) => {
    if (modId < N) setAnalytics(a => {
      const qc = [...a.quizCorrect]; const qt = [...a.quizTotal];
      qc[modId] = correct; qt[modId] = total;
      return {...a, quizCorrect: qc, quizTotal: qt};
    });
  };

  const handleTTS = (action) => {
    if (!('speechSynthesis' in window)) return;
    if (action === 'stop') { window.speechSynthesis.cancel(); setTtsState('idle'); return; }
    if (action === 'pause') { window.speechSynthesis.pause(); setTtsState('paused'); return; }
    if (action === 'play') {
      if (ttsState === 'paused') { window.speechSynthesis.resume(); setTtsState('playing'); return; }
      window.speechSynthesis.cancel();
      const sep = lang === 'zh' ? '。 ' : '. ';
      const mKeys = ['m1','m2','m3','m4','m5','m6','m7'];
      const mk = mKeys[module];
      let texts = [];
      if (mk) {
        texts = [
          t[`${mk}_title`],
          t[`${mk}_p1`], t[`${mk}_p2`], t[`${mk}_p3`],
          ...(t[`${mk}_cards`] || []).map(c => `${c.title}. ${c.desc}`),
          ...(t[`${mk}_timeline`] || []).map(s => `${s.title}. ${s.desc}`),
          ...(t[`${mk}_examples`] || []).map(e => `${e.name}. ${e.desc}`),
          ...(t[`${mk}_terms`] || []).flatMap(term => [term.front, term.back])
          // ModuleQuiz 題幹不列入 TTS（互動元件，不適合語音朗讀）
        ].filter(Boolean);
      } else {
        texts = [t.analytics_title, t.analytics_desc].filter(Boolean);
      }
      const text = texts.join(sep);
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.95;
      const voices = window.speechSynthesis.getVoices();
      if (lang === 'zh') {
        const v = voices.find(v => v.lang === 'zh-TW' && v.name.includes('Yating')) || voices.find(v => v.lang === 'zh-TW') || voices.find(v => v.lang.startsWith('zh'));
        if (v) utterance.voice = v;
        utterance.lang = 'zh-TW';
      } else {
        const v = voices.find(v => v.lang === 'en-GB' && v.name.includes('Daniel')) || voices.find(v => v.lang === 'en-GB') || voices.find(v => v.lang.startsWith('en'));
        if (v) utterance.voice = v;
        utterance.lang = 'en-GB';
      }
      utterance.onend = () => setTtsState('idle');
      utterance.onerror = () => setTtsState('idle');
      window.speechSynthesis.speak(utterance);
      setTtsState('playing');
    }
  };

  const handleExportCSV = () => {
    const BOM = '\uFEFF';
    const mNavKeys = ['m1_nav','m2_nav','m3_nav','m4_nav','m5_nav','m6_nav','m7_nav'];
    const rows = [
      [t.analytics_group, t.analytics_dept, t.analytics_id, t.analytics_name],
      [studentInfo.group, studentInfo.dept, studentInfo.id, studentInfo.name],
      [],
      [t.analytics_module, t.analytics_time, t.analytics_clicks, t.analytics_acc, t.analytics_correct_ans_total],
      ...Array.from({length: N}, (_,i) => {
        const acc = analytics.quizTotal[i] > 0 ? Math.round(analytics.quizCorrect[i]/analytics.quizTotal[i]*100)+'%' : t.analytics_no_data;
        const ans = analytics.quizTotal[i] > 0 ? `${analytics.quizCorrect[i]}/${analytics.quizTotal[i] <= analytics.quizCorrect[i] ? analytics.quizTotal[i] : analytics.quizTotal[i]}/${8}` : t.analytics_no_data;
        return [t[mNavKeys[i]], analytics.time[i]+t.analytics_sec, analytics.clicks[i]+t.analytics_times, acc, ans];
      })
    ];
    const csv = BOM + rows.map(r => r.join(',')).join('\n');
    const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'learning_analytics.csv'; a.click();
  };

  const modulesList = [
    { id: 0, icon: <IconBriefcase size={16}/>, title: t.m1_nav },
    { id: 1, icon: <IconUsers size={16}/>, title: t.m2_nav },
    { id: 2, icon: <IconTrendingUp size={16}/>, title: t.m3_nav },
    { id: 3, icon: <IconGlobe size={16}/>, title: t.m4_nav },
    { id: 4, icon: <IconBarChart2 size={16}/>, title: t.m5_nav },
    { id: 5, icon: <IconCpu size={16}/>, title: t.m6_nav },
    { id: 6, icon: <IconHeart size={16}/>, title: t.m7_nav },
    { id: 7, icon: <IconBarChart2 size={16}/>, title: t.analytics_title }

  const renderNavBottom = () => (
    <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700">

        className="px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] disabled:opacity-0 transition-colors flex items-center uppercase text-sm tracking-wider">
        ← {t.nav_prev}
      </button>

        className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] disabled:opacity-0 transition-colors flex items-center uppercase text-sm tracking-wider shadow-md">
        {t.nav_next} <IconArrowRight size={16} className="ml-2"/>

    </div>

  const renderContent = () => {
    const base = "space-y-6 text-base leading-relaxed text-slate-700 dark:text-slate-300 animate-fade-in";

    if (module === 0) return (

        <aside className="hidden md:block w-64 shrink-0 mr-6">
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden mb-4 md:mb-0 md:sticky md:top-24">
            <div className="bg-[#004030]/5 dark:bg-[#D8C3A5]/5 px-4 py-3 border-b border-slate-200 dark:border-slate-700">
              <p className="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">{t.nav_modules}</p>
            </div>
            <nav className="space-y-0.5 p-2">
              {modulesList.map(m => (
                <button key={m.id} onClick={() => { setModule(m.id); setMenuOpen(false); }}
                  className={`w-full flex items-center px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-left
                    ${module === m.id
                      ? 'bg-[#004030] dark:bg-[#D8C3A5]/20 text-white dark:text-[#D8C3A5] border border-[#D8C3A5]/30'
                      : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50'
                    }`}>
                  <span className={`mr-2.5 ${module===m.id ? 'text-[#D8C3A5] dark:text-[#D8C3A5]' : 'opacity-50'}`}>{m.icon}</span>
                  <span className="truncate">{m.title}</span>
                  {module === m.id && <IconChevronRight size={14} className="ml-auto opacity-50 shrink-0"/>}
                </button>
              ))}
            </nav>
          </div>
        </aside>

        {/* Main Content */}
        <main ref={contentRef} className="flex-1 min-w-0" onClick={handleClick}>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-6 md:p-8">
            {renderContent()}
          </div>
        </main>
      </div>

      {/* Footer */}
      <footer className="bg-[#004030] dark:bg-slate-950 text-slate-300 dark:text-slate-400 border-t border-[#D8C3A5]">
        <div className="max-w-7xl mx-auto px-4 h-8 flex justify-between items-center text-[10px] sm:text-xs">
          <div className="flex items-center space-x-2 md:space-x-4">
            <div className="font-serif font-black text-[#D8C3A5] hidden sm:block tracking-widest text-sm">ENT</div>
            <span className="truncate">{t.copyright} · {t.date}</span>
          </div>
          <div className="flex items-center space-x-3 md:space-x-4">
            <span className="text-[#D8C3A5]/70 font-serif hidden sm:inline">
              Architect:&nbsp;
              <a
                href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo"
                target="_blank"
                rel="noopener noreferrer"
                className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors"
              >
                Prof. Shihmin Lo
              </a>
            </span>
            <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})}
              className="flex items-center uppercase tracking-widest hover:text-white transition-colors border-l border-slate-600 pl-3">
              <IconChevronUp size={12} className="md:mr-1"/> <span className="hidden sm:inline">TOP</span>
            </button>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
